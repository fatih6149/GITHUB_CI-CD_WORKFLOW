name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ✅ Initialize Gradle project (for learning/demo)
    - name: Initialize Gradle project
      run: gradle init --type java-application --dsl groovy --project-name demo --package com.example.demo --test-framework junit --no-daemon --overwrite

    # ✅ Build the generated project
    - name: Build with Gradle
      run: gradle build

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ✅ Initialize again (needed because each job runs in a fresh environment)
    - name: Initialize Gradle project
      run: gradle init --type java-application --dsl groovy --project-name demo --package com.example.demo --test-framework junit --no-daemon --overwrite

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4
